# ============================================================
# Configuración optimizada para alta carga de sensores IoT
# Basado en: Kim, H.J. & Lee, M.H. (2026). "A Comparative
# Performance Study of Parallel MQTT and RS485..." Electronics,
# 15(4):760 (Tabla 2, config. de Mosquitto v2.0.x)
# ============================================================

listener 1883
allow_anonymous true

# --- Persistencia y memoria ---
# false = todo en RAM, sin I/O a disco. Ideal para pruebas de carga
# y para escalar a 100k+ sensores. Si necesitas retener mensajes
# QoS>0 tras un reinicio del broker, cambia a "true".
persistence false

# --- Límites de conexión ---
# -1 = sin límite interno del broker; el límite real lo pone el OS
# (ver max_open_files más abajo si tienes miles de clientes).
max_connections -1

# --- Control de mensajes en vuelo y en cola (clave para evitar pérdidas) ---
# max_inflight_messages: mensajes QoS>=1 sin confirmar (PUBACK) por
# cliente antes de que el broker deje de enviarle más. Con QoS 0 este
# valor no aplica (no hay ACK), pero déjalo listo para cuando subas a QoS 1.
max_inflight_messages 20

# max_queued_messages: profundidad de la cola por cliente mientras un
# suscriptor está lento o desconectado momentáneamente. Con miles de
# sensores publicando en ráfaga, una cola pequeña descarta mensajes
# silenciosamente. 1000 es el valor validado por Kim & Lee para
# sensores de alta frecuencia (muestreo 1-3s); si tu ráfaga es más
# grande que eso, súbelo, pero vigila el uso de RAM (persistence=false
# significa que todo esto vive en memoria).
max_queued_messages 1000

# --- Tamaño máximo de payload ---
# Tu JSON actual (~250-300 bytes) va sobrado con el límite por defecto,
# pero lo fijamos explícito para evitar sorpresas si el payload crece.
message_size_limit 1048576

# --- Logging ---
# "all" es útil para depurar pérdida de mensajes ahora mismo, pero
# genera mucho I/O de disco/consola bajo carga alta. Una vez que
# confirmes que el sistema es estable, bájalo a algo como:
#   log_type error
#   log_type warning
log_type all
